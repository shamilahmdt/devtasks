name: CI/CD Quality Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

  pr-title-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR Title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            // More permissive regex for dependabot and long titles
            const regex = /^(feat|fix|docs|style|refactor|test|chore|ci|revert)(\(.+\))?: .{1,200}$/;
            if (!regex.test(title)) {
              core.setFailed(`PR title "${title}" does not follow Conventional Commits format! Example: "feat: add task filtering"`);
            }
