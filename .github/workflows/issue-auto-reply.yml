name: Issue Auto Reply

on:
  issues:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment and React
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issue = context.payload.issue;
              
              if (!issue) {
                console.log("No issue found in payload.");
                return;
              }
              
              const number = issue.number;
              const author = issue.user.login;
              console.log(`Processing issue #${number} by @${author}`);
              
              // Add reactions
              try {
                await github.rest.reactions.createForIssue({
                  owner, repo, issue_number: number, content: 'heart'
                });
                console.log("Added heart reaction");
              } catch (e) {
                console.log(`Non-critical: Failed to add reaction: ${e.message}`);
              }

              const message = `👋 Hi @${author}! Thanks for opening this issue for **DevTasks**.
              
A maintainer will review your report shortly. Please ensure you've provided enough detail for us to reproduce the issue.

---

### ⭐ Support the Project
- ⭐ Star the repo

Thanks for helping us improve!`;

              await github.rest.issues.createComment({
                issue_number: number,
                owner,
                repo,
                body: message
              });
              console.log("Successfully added comment");
            } catch (error) {
              console.error(`Workflow failed critically: ${error.message}`);
              core.setFailed(error.message);
            }
