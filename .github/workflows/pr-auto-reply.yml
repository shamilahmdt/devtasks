name: PR Auto Reply

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: Comment and React
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const pr = context.payload.pull_request;
              
              if (!pr) {
                console.log("No pull request found in payload.");
                return;
              }
              
              const number = pr.number;
              const author = pr.user.login;
              console.log(`Processing PR #${number} by @${author}`);
              const association = pr.author_association;
              const isFirstTime = association === 'FIRST_TIME_CONTRIBUTOR' || association === 'NONE';
              
              // Add reactions to the PR itself
              const reactions = ['rocket', 'heart', 'eyes'];
              for (const content of reactions) {
                try {
                  await github.rest.reactions.createForIssue({
                    owner, repo, issue_number: number, content
                  });
                  console.log(`Added ${content} reaction`);
                } catch (e) {
                  console.log(`Non-critical: Failed to add reaction ${content}: ${e.message}`);
                }
              }
              
              const greeting = isFirstTime 
                ? `🌟 **Welcome @${author} to the community!** We're so excited to have you make your first contribution here! 🚀`
                : `👋 Welcome back @${author}! Thanks for continuing to help improve this project 💙`;

              const message = `${greeting}

Thanks for contributing to **DevTasks**! 🚀

### ✅ Quick Checklist:
- [ ] 📸 Added **screenshots** for UI changes
- [ ] 🎨 Follows **Monochrome theme** (Black/Grey/White)
- [ ] 📜 PR title follows conventional commits

### 🚀 What's Next?
A maintainer will review your changes shortly. If everything looks good, it will be merged into the \`main\` branch.

---

### ⭐ Support the Project
- ⭐ Star the repo
- ⭐ Support more: [Jazzahenna](https://github.com/shamilahmdt/Jazzahenna) · [shamilahmdt.github.io](https://github.com/shamilahmdt/shamilahmdt.github.io)

Thanks again!`;

              await github.rest.issues.createComment({
                issue_number: number,
                owner: owner,
                repo: repo,
                body: message
              });
              console.log("Successfully added comment");
            } catch (error) {
              console.error(`Workflow failed critically: ${error.message}`);
              core.setFailed(error.message);
            }
