name: Auto Assign Expire

on:
  issue_comment:
    types:
      - created

  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

jobs:
  assign:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest

    steps:
      - name: Assign commenter
        uses: actions/github-script@v9
        with:
          script: |
            const comment = (context.payload.comment.body || '')
              .trim()
              .toLowerCase();

            // Skip comments made by bots
            if (context.payload.comment.user.type === 'Bot' || context.payload.comment.user.login.endsWith('[bot]')) {
              return;
            }

            // Skip pull requests
            if (context.payload.issue.pull_request) {
              return;
            }

            const triggers = [
              "/assign",
              "assign me",
              "work on this",
              "work on this issue",
              "i want to work on this",
              "can i take this",
              "let me work on this"
            ];

            const shouldAssign = triggers.some(trigger => {
              if (trigger.startsWith('/')) {
                return comment.startsWith(trigger);
              }
              
              // For phrase triggers, check if they exist in the comment
              const index = comment.indexOf(trigger);
              if (index === -1) {
                return false;
              }
              
              // Check if the trigger is preceded by any negation words (e.g., "don't", "can't", "not")
              const preceding = comment.substring(0, index).trim();
              const negations = ["don't", "dont", "can't", "cant", "cannot", "not", "won't", "wont", "unable"];
              
              // Check if any negation word is present with word boundaries in the preceding text
              const hasNegation = negations.some(neg => {
                const regex = new RegExp(`\\b${neg}\\b`);
                return regex.test(preceding);
              });
              
              return !hasNegation;
            });

            if (!shouldAssign) {
              return;
            }

            const issueNumber = context.payload.issue.number;
            const username = context.payload.comment.user.login;

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            // Skip if the issue is already closed
            if (issue.data.state !== 'open') {
              return;
            }

            // Check if user is already assigned
            const alreadyAssigned = issue.data.assignees.some(
              assignee => assignee.login === username
            );

            if (alreadyAssigned) {
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [username]
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Hi @${username},\n\nThank you for your interest in this issue and for contributing to the project!\n\nYou have been successfully assigned. You may begin working on it immediately.\n\nPlease note: To keep the repository active and ensure issues are addressed in a timely manner, assignments will automatically expire after 48 hours if the issue remains open. If you need an extension or have any questions, please leave a comment here to notify the maintainers.\n\nHappy coding!`
            });

  expire:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest

    steps:
      - name: Remove expired assignees
        uses: actions/github-script@v9
        with:
          script: |
            const EXPIRY_MS = 48 * 60 * 60 * 1000;

            // Fetch all open issues in the repository
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100
              }
            );

            for (const issue of issues) {
              // Skip pull requests
              if (issue.pull_request) {
                continue;
              }

              // Skip if there are no assignees
              if (!issue.assignees || issue.assignees.length === 0) {
                continue;
              }

              // Fetch the timeline/events for this issue to check when assignees were added
              const events = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 100
                }
              );

              for (const assignee of issue.assignees) {
                const username = assignee.login;

                // Find the latest 'assigned' event for this user on this issue
                const assignedEvents = events
                  .filter(
                    event => event.event === "assigned" && event.assignee && event.assignee.login === username
                  )
                  .sort(
                    (a, b) => new Date(a.created_at) - new Date(b.created_at)
                  );

                if (assignedEvents.length === 0) {
                  continue;
                }

                // Get the timestamp of the latest assignment
                const latestAssignment = assignedEvents[assignedEvents.length - 1];
                const assignedAt = new Date(latestAssignment.created_at).getTime();

                if (Date.now() - assignedAt >= EXPIRY_MS) {
                  // Remove assignee
                  await github.rest.issues.removeAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    assignees: [username]
                  });

                  // Post an expiration notice comment
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `Hi @${username},\n\nAs this issue has been inactive and the 48-hour assignment period has expired, you have been unassigned to keep the issue available for other contributors.\n\nThank you for your interest, and feel free to request reassignment if you are ready to work on it again!`
                  });
                }
              }
            }
